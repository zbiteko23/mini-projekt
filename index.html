<!doctype html>
<html lang="cs">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Tower Defense - Mini Projekt</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="app">
    <header>
      <h1>Tower Defense</h1>
      <p class="tagline">4 věže • 5 levelů • Vlny nepřátel</p>
    </header>

    <main class="layout">
      <aside class="sidebar">
        <div class="panel">
          <div>Level:
            <select id="levelSelect"></select>
          </div>
          <div>Peněženka: <span id="money">100</span></div>
          <div>Životy: <span id="lives">20</span></div>
          <div>Vlna: <span id="wave">0</span>/<span id="waveTotal">0</span></div>
          <button id="startWave">Start vlna</button>
        </div>

        <div class="panel">
          <h3>Info</h3>
          <div id="log" class="log">Vyber level a stiskni Start vlna.</div>
        </div>
      </aside>

      <section class="game-area">
        <div class="hud">
          <div class="hud-item">Peněženka: <span id="hud-money">200</span></div>
          <div class="hud-item">Vlna: <span id="hud-wave">0</span>/<span id="hud-waveTotal">0</span></div>
          <div class="hud-item">Životy: <span id="hud-lives">20</span></div>
        </div>
        <div class="canvas-wrap">
          <canvas id="gameCanvas" width="900" height="520"></canvas>
        </div>

        <div class="toolbar">
          <div class="tower-card" data-type="arrow" data-cost="50"><div class="icon arrow"></div><div class="label">Arrow<br><span class="cost">50</span></div></div>
          <div class="tower-card" data-type="magic" data-cost="80"><div class="icon magic"></div><div class="label">Magic<br><span class="cost">80</span></div></div>
          <div class="tower-card" data-type="mortar" data-cost="100"><div class="icon mortar"></div><div class="label">Mortar<br><span class="cost">100</span></div></div>
          <div class="tower-card" data-type="knight" data-cost="60"><div class="icon knight"></div><div class="label">Knight<br><span class="cost">60</span></div></div>
        </div>
      </section>
    </main>

    <footer>
      <small>Mini projekt - GitHub Copilot</small>
    </footer>
  </div>

  <script src="script.js"></script>
</body>
</html>
